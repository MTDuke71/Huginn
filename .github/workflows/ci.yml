# CI matrix (#60): Windows MSVC is the primary development platform and is
# tested first-class; Linux GCC/Clang cover the portable build; Fathom is
# exercised both ON and OFF.
#
# The sanitizer leg is MANUAL-ONLY (workflow_dispatch): as a Debug+ASan job
# on every push it took 4+ hours of runner time (the test suite is search-
# heavy and Debug+ASan is a ~100x slowdown), which is why this workflow was
# disabled for day-to-day solo development. It now builds RelWithDebInfo
# (optimized ASan+UBSan, ~10x faster, same bug coverage) and is capped by
# timeout-minutes. Trigger it when chasing a memory/UB bug:
#   gh workflow run CI            (runs the full matrix + sanitizers)
# Heavy-labelled CTest jobs (full perft) are excluded everywhere — run those
# locally: ctest --test-dir <build> -C Release -L heavy
name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-msvc-release-fathom
            os: windows-latest
            configure: cmake -B build -A x64 -DENABLE_FATHOM=ON
            build: cmake --build build --config Release
            test: ctest --test-dir build -C Release --output-on-failure --no-tests=error -LE heavy
          - name: linux-gcc-release-fathom
            os: ubuntu-latest
            configure: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++ -DENABLE_FATHOM=ON
            build: cmake --build build -j4
            test: ctest --test-dir build -C Release --output-on-failure --no-tests=error -LE heavy
          - name: linux-clang-release-nofathom
            os: ubuntu-latest
            configure: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DENABLE_FATHOM=OFF
            build: cmake --build build -j4
            test: ctest --test-dir build -C Release --output-on-failure --no-tests=error -LE heavy
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: ${{ matrix.configure }}
      - name: Build
        run: ${{ matrix.build }}
      - name: Test
        run: ${{ matrix.test }}

  # Sanitizer leg: manual-only (see header comment). RelWithDebInfo + ASan +
  # UBSan + debug assertions — optimized enough to finish in minutes, still
  # catches the memory/UB bugs the Release legs cannot.
  sanitizers:
    name: linux-clang-relwithdebinfo-sanitizers
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DENABLE_FATHOM=OFF -DENABLE_SANITIZERS=ON -DENABLE_DEBUG_ASSERTIONS=ON
      - name: Build
        run: cmake --build build -j4
      - name: Test
        run: ctest --test-dir build -C RelWithDebInfo --output-on-failure --no-tests=error -LE heavy

  engine-only:
    # BUILD_TESTING=OFF must build the engine with no GoogleTest fetch (#60).
    name: linux-gcc-engine-only-no-gtest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Configure (BUILD_TESTING=OFF)
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF -DENABLE_FATHOM=ON
      - name: Build engine
        run: cmake --build build -j4 --target huginn
      - name: Smoke test (uci handshake)
        run: printf 'uci\nquit\n' | ./build/bin/huginn | grep -q uciok
